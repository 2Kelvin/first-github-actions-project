name: Using variables and secrets
on: push
env: # global variables used in whole workflow by multiple jobs
  dockerUser: kev
  dockerImageName: springboot-api
  dockerRegistry: docker.io

jobs:
  docker_build_login_and_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Docker build
        run: echo "docker build -t $dockerRegistry/$dockerUser/$dockerImageName:latest"

      - name: Docker login
        env:
          dockerPasswd: myPassw1234 # variable used in this step only
        run: echo "docker login --username=$dockerUser --password=$dockerPasswd"

      - name: Docker build
        run: echo "docker push $dockerRegistry/$dockerUser/$dockerImageName:latest"

  docker_deploy:
    needs: docker_build_login_and_publish
    runs-on: ubuntu-latest
    steps:
      - name: Docker run
        env:
          dockerPort: 8080:80 # variable used in this step only
        run: echo "docker run -d -p $dockerPort $dockerRegistry/$dockerUser/$dockerImageName:latest"