name: Using variables and secrets
on: push
env: # environment variables used in whole workflow by multiple jobs
  DOCKER_USER: kev
  DOCKER_IMAGE_NAME: springboot-api
  DOCKER_REGISTRY: docker.io

jobs:
  docker_build_login_and_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Docker build
        run: echo "docker build -t $DOCKER_REGISTRY/$DOCKER_USER/$DOCKER_IMAGE_NAME:latest"

      - name: Docker login
        env:
          DOCKER_PASSWD: myPassw1234 # environment variable used in this step only
        run: echo "docker login --username=$DOCKER_USER --password=$DOCKER_PASSWD"

      - name: Docker push
        run: echo "docker push $DOCKER_REGISTRY/$DOCKER_USER/$DOCKER_IMAGE_NAME:latest"

  docker_deploy:
    needs: docker_build_login_and_publish
    runs-on: ubuntu-latest
    steps:
      - name: Docker run
        env:
          DOCKER_PORT: 8080:80 # environment variable used in this step only
        run: echo "docker run -d -p $DOCKER_PORT $DOCKER_REGISTRY/$DOCKER_USER/$DOCKER_IMAGE_NAME:latest"